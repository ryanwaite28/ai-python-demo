apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-python-demo
  namespace: ai-python-demo
  labels:
    app: ai-python-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-python-demo
  template:
    metadata:
      labels:
        app: ai-python-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      imagePullSecrets:
      - name: harbor-credentials
      initContainers:
      - name: db-migrate
        image: harbor.rmwhs.space/apps/ai-python-demo:${IMAGE_TAG}
        imagePullPolicy: Always
        command: ["flask", "db", "upgrade"]
        envFrom:
        - configMapRef:
            name: ai-python-demo-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-python-demo-secret
              key: DATABASE_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: ai-python-demo-secret
              key: SECRET_KEY
      containers:
      - name: ai-python-demo
        image: harbor.rmwhs.space/apps/ai-python-demo:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: ai-python-demo-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-python-demo-secret
              key: DATABASE_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: ai-python-demo-secret
              key: SECRET_KEY
        volumeMounts:
        - name: app-logs
          mountPath: /app/logs
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30

      # Fluent Bit sidecar — ships logs to OpenSearch
      - name: fluent-bit
        image: fluent/fluent-bit:3.2
        volumeMounts:
        - name: app-logs
          mountPath: /logs
          readOnly: true
        - name: fluent-bit-config
          mountPath: /fluent-bit/etc
        - name: fluent-bit-state
          mountPath: /var/lib/fluent-bit

      volumes:
      - name: app-logs
        emptyDir: {}
      - name: fluent-bit-config
        configMap:
          name: ai-python-demo-fluent-bit
      - name: fluent-bit-state
        emptyDir: {}