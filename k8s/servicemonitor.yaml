apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-python-demo
  namespace: ai-python-demo
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: ai-python-demo
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
  namespaceSelector:
    matchNames:
    - ai-python-demo