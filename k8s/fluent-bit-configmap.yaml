apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-python-demo-fluent-bit
  namespace: ai-python-demo
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  /fluent-bit/etc/parsers.conf
        storage.path  /var/lib/fluent-bit/storage

    [INPUT]
        Name              tail
        Path              /logs/app.*.log
        Parser            flask_json
        Tag               flask.ai-python-demo
        Refresh_Interval  30
        DB                /var/lib/fluent-bit/tail.db
        DB.Sync           Normal
        Skip_Long_Lines   On
        Mem_Buf_Limit     5MB

    [FILTER]
        Name    modify
        Match   flask.*
        Rename  level log_level

    [OUTPUT]
        Name               opensearch
        Match              flask.*
        Host               ${OPENSEARCH_HOST}
        Port               ${OPENSEARCH_PORT}
        HTTP_User          ${OPENSEARCH_USER}
        HTTP_Passwd        ${OPENSEARCH_PASSWORD}
        tls                On
        tls.verify         Off
        Logstash_Format    On
        Logstash_Prefix    ${OPENSEARCH_INDEX}
        Logstash_DateFormat %Y.%m.%d
        Time_Key           @timestamp
        Time_Key_Format    %Y-%m-%dT%H:%M:%S.%LZ
        Suppress_Type_Name On
        Retry_Limit        5
        storage.total_limit_size 32M

  parsers.conf: |
    [PARSER]
        Name        flask_json
        Format      json
        Time_Key    timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep   On