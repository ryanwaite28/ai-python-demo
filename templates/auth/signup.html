{% extends "base.html" %}

{% block title %}Sign Up - Demo Blog{% endblock %}

{% block content %}
<div ng-app="blogApp" ng-controller="AuthController" class="auth-container">
    <div class="auth-card">
        <h1>Sign Up</h1>
        
        <div ng-if="error" class="error-message">
            (( error ))
        </div>
        
        <form ng-submit="signup()" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    ng-model="signupData.username" 
                    required 
                    class="form-control">
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    ng-model="signupData.email" 
                    required 
                    class="form-control">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    ng-model="signupData.password" 
                    required 
                    class="form-control">
            </div>
            
            <div class="form-group">
                <label for="bio">Bio (optional)</label>
                <textarea 
                    id="bio" 
                    ng-model="signupData.bio" 
                    rows="3" 
                    class="form-control"></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary" ng-disabled="loading">
                <span ng-if="!loading">Sign Up</span>
                <span ng-if="loading">Creating account...</span>
            </button>
        </form>
        
        <p class="auth-link">
            Already have an account? <a href="/login">Login</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/services/api.service.js') }}"></script>
<script src="{{ url_for('static', filename='js/controllers/auth.controller.js') }}"></script>
{% endblock %}
