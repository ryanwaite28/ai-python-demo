{% extends "base.html" %}

{% block title %}Login - Demo Blog{% endblock %}

{% block content %}
<div ng-app="blogApp" ng-controller="AuthController" class="auth-container">
    <div class="auth-card">
        <h1>Login</h1>
        
        <div ng-if="error" class="error-message">
            (( error ))
        </div>
        
        <form ng-submit="login()" class="auth-form">
            <div class="form-group">
                <label for="email_or_username">Email or Username</label>
                <input 
                    type="text" 
                    id="email_or_username" 
                    ng-model="loginData.email_or_username" 
                    required 
                    class="form-control">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    ng-model="loginData.password" 
                    required 
                    class="form-control">
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" ng-model="loginData.remember_me">
                    Remember me
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary" ng-disabled="loading">
                <span ng-if="!loading">Login</span>
                <span ng-if="loading">Logging in...</span>
            </button>
        </form>
        
        <p class="auth-link">
            Don't have an account? <a href="/signup">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/services/api.service.js') }}"></script>
<script src="{{ url_for('static', filename='js/controllers/auth.controller.js') }}"></script>
{% endblock %}
