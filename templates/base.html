<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Demo Blog{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <a href="/" class="nav-brand">Demo Blog</a>
            
            <div class="nav-links">
                {% if current_user.is_authenticated %}
                    <!-- Authenticated Navigation -->
                    <a href="/home/{{ current_user.id }}">Home</a>
                    <a href="/feed">Feed</a>
                    <a href="/posts">Posts</a>
                    <a href="/tags">Tags</a>
                    <a href="/messages">Messages</a>
                    <a href="/posts/create" class="btn btn-sm btn-primary">Create Post</a>
                    
                    <div class="nav-user-menu">
                        <span class="nav-username">{{ current_user.username }}</span>
                        <div class="nav-dropdown">
                            <a href="/settings">Settings</a>
                            <a href="#" onclick="logout(); return false;">Logout</a>
                        </div>
                    </div>
                {% else %}
                    <!-- Public Navigation -->
                    <a href="/">Home</a>
                    <a href="/posts">Posts</a>
                    <a href="/tags">Tags</a>
                    <a href="/search">Search</a>
                    <a href="/login" class="btn btn-sm">Login</a>
                    <a href="/signup" class="btn btn-sm btn-primary">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        function logout() {
            fetch('/api/auth/logout', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/';
                    }
                })
                .catch(error => console.error('Logout error:', error));
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
