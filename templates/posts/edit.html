{% extends "base.html" %}

{% block title %}Edit Post - Demo Blog{% endblock %}

{% block content %}
<div ng-app="blogApp" ng-controller="PostsController" ng-init="loadPost({{ request.view_args.post_id }})">
    <div class="page-header">
        <h1>Edit Post</h1>
    </div>
    
    <div ng-if="loading" class="loading">Loading post...</div>
    
    <div ng-if="error" class="error-message">(( error ))</div>
    
    <form ng-submit="updatePost(currentPost.id, postData)" class="post-form" ng-if="currentPost">
        <div class="form-group">
            <label for="title">Title</label>
            <input 
                type="text" 
                id="title" 
                ng-model="currentPost.title" 
                required 
                class="form-control">
        </div>
        
        <div class="form-group">
            <label for="content">Content</label>
            <textarea 
                id="content" 
                ng-model="currentPost.content" 
                rows="10" 
                required 
                class="form-control"></textarea>
        </div>
        
        <div class="form-group">
            <label for="tags">Tags (comma-separated)</label>
            <input 
                type="text" 
                id="tags" 
                ng-model="tagsInput" 
                ng-init="tagsInput = currentPost.tags.map(function(t) { return t.name; }).join(', ')"
                class="form-control">
        </div>
        
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" ng-model="currentPost.status" class="form-control">
                <option value="published">Published</option>
                <option value="draft">Draft</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" ng-disabled="loading">
                <span ng-if="!loading">Update Post</span>
                <span ng-if="loading">Updating...</span>
            </button>
            <a href="/posts/(( currentPost.id ))" class="btn">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/services/api.service.js') }}"></script>
<script src="{{ url_for('static', filename='js/controllers/posts.controller.js') }}"></script>
{% endblock %}
