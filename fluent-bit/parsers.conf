# Fluent Bit parsers for the Flask application log format.
#
# The JSON parser matches the output of logging_config.JsonFormatter.
# Every record has at minimum:
#   timestamp   – ISO 8601 UTC with milliseconds, e.g. 2026-05-22T10:30:00.123Z
#   level       – DEBUG | INFO | WARNING | ERROR | CRITICAL
#   logger      – Python logger name
#   message     – formatted log line
#   service     – SERVICE_NAME env var value
#   environment – FLASK_ENV value
#   host        – container/machine hostname

[PARSER]
    Name        flask_json
    Format      json
    # Parse the timestamp field as the record time so OpenSearch gets
    # the event time rather than the Fluent Bit ingestion time.
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On
