# Shared Fluent Bit configuration — included by both fluent-bit.local.conf
# and fluent-bit.prod.conf via @INCLUDE.
# Contains SERVICE globals, INPUT (tail), and FILTER blocks that are
# identical across all deployment targets.

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    # Disk-backed buffer — records survive a Fluent Bit restart even if the
    # output is temporarily unreachable.
    storage.path  /var/lib/fluent-bit/storage


[INPUT]
    Name              tail
    # Wildcard matches all dated log files: app.20260522.log, app.20260523.log, …
    Path              /logs/app.*.log
    Parser            flask_json
    Tag               flask.app
    # Rescan for new day files every 30 seconds.
    Refresh_Interval  30
    # SQLite DB persists the read offset so restarts never re-ship records.
    DB                /var/lib/fluent-bit/tail.db
    DB.Sync           Normal
    # Discard lines that cannot be parsed (e.g. gunicorn startup noise).
    Skip_Long_Lines   On
    Mem_Buf_Limit     5MB


[FILTER]
    Name    modify
    Match   flask.*
    # Rename 'level' → 'log_level' to avoid clashing with OpenSearch's
    # reserved 'level' field in some default index templates.
    Rename  level log_level
