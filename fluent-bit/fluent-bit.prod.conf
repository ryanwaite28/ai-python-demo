# Production output config.
# Forwards to an external OpenSearch cluster (AWS OpenSearch, self-hosted, etc.)
# with TLS and HTTP Basic auth supplied via environment variables.
#
# A second, commented-out S3 output is included for log archival — uncomment
# and supply S3_BUCKET / S3_REGION env vars to activate it.
#
# Mounted by docker-compose.prod.yml as /fluent-bit/etc/fluent-bit.conf.

@INCLUDE /fluent-bit/etc/common.conf


# ── Primary output: external OpenSearch ───────────────────────────────────────

[OUTPUT]
    Name               opensearch
    Match              flask.*
    Host               ${OPENSEARCH_HOST}
    Port               ${OPENSEARCH_PORT}
    HTTP_User          ${OPENSEARCH_USER}
    HTTP_Passwd        ${OPENSEARCH_PASSWORD}
    tls                On
    tls.verify         On
    # Daily indices: flask-logs-2026.05.22
    # Use OpenSearch ISM policies on this prefix to automate retention.
    Logstash_Format    On
    Logstash_Prefix    ${OPENSEARCH_INDEX}
    Logstash_DateFormat %Y.%m.%d
    Time_Key           @timestamp
    Time_Key_Format    %Y-%m-%dT%H:%M:%S.%LZ
    Suppress_Type_Name On
    Retry_Limit        5
    storage.total_limit_size 64M


# ── Optional second output: S3 archival ───────────────────────────────────────
# Uncomment this block and set S3_BUCKET + S3_REGION (+ AWS credentials or
# attach an IAM instance role) to archive all log records to S3 in addition
# to the OpenSearch primary output.
#
# [OUTPUT]
#     Name                  s3
#     Match                 flask.*
#     bucket                ${S3_BUCKET}
#     region                ${S3_REGION}
#     # Partition logs by day under a predictable prefix.
#     s3_key_format         /flask-logs/%Y/%m/%d/%H-%M-%S.gz
#     s3_key_format_tag_delimiters .
#     use_put_object        On
#     compression           gzip
#     # Accumulate 5 minutes of records before flushing to S3 to reduce
#     # the number of small objects written.
#     upload_timeout        5m
#     store_dir             /var/lib/fluent-bit/s3
#     Retry_Limit           5
