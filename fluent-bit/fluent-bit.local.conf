# Local development output config.
# Forwards to the opensearch container defined in docker-compose.local.yml.
# Security is disabled on that container, so no credentials or TLS are needed.
#
# Mounted by docker-compose.local.yml as /fluent-bit/etc/fluent-bit.conf.

@INCLUDE /fluent-bit/etc/common.conf


[OUTPUT]
    Name               opensearch
    Match              flask.*
    Host               opensearch
    Port               9200
    # No HTTP auth — security plugin is disabled on the local container.
    HTTP_User
    HTTP_Passwd
    tls                Off
    # Daily indices: flask-logs-2026.05.22
    Logstash_Format    On
    Logstash_Prefix    flask-logs
    Logstash_DateFormat %Y.%m.%d
    Time_Key           @timestamp
    Time_Key_Format    %Y-%m-%dT%H:%M:%S.%LZ
    Suppress_Type_Name On
    Retry_Limit        3
    storage.total_limit_size 32M
